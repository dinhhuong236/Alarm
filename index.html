<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>10 Minute Timer</title>
</head>

<body style="text-align:center;margin-top:120px;font-family:Arial">

<h1>Đếm ngược 10 phút</h1>

<div id="timer" style="font-size:70px">10:00</div>

<button onclick="startTimer()" style="font-size:26px;padding:12px 30px">
Tap để bắt đầu
</button>

<audio id="alarm" loop>
<source src="alarm.mp3" type="audio/mpeg">
</audio>

<script>

let time = 6;
let interval;
let alarm = document.getElementById("alarm");

function startTimer(){

    // unlock audio trên iPhone
    alarm.play().then(()=>{
        alarm.pause();
        alarm.currentTime = 0;
    });

    document.querySelector("button").style.display="none";

    interval = setInterval(function(){

        let min = Math.floor(time/60);
        let sec = time % 60;

        if(sec < 10) sec = "0"+sec;

        document.getElementById("timer").innerHTML = min+":"+sec;

        if(time <= 0){

            clearInterval(interval);

            // phát nhạc ngay lập tức
            alarm.play();

        }

        time--;

    },1000);

}

</script>

</body>
</html>
