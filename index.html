<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Start Timer</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:120px">

<h2>Đang mở hẹn giờ 10 phút...</h2>

<script>

var ua = navigator.userAgent.toLowerCase();

if(ua.includes("android")){

    window.location.href =
    "intent:#Intent;action=android.intent.action.SET_TIMER;S.android.intent.extra.alarm.LENGTH=600;end";

}else if(ua.includes("iphone") || ua.includes("ipad")){

    window.location.href =
    "https://www.icloud.com/shortcuts/7b1c5ab3deed4690ab5419d9e5f27f8e";

}

</script>

</body>
</html>
