<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer 10 phút</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:120px;
}

#timer{
    font-size:70px;
    font-weight:bold;
}

button{
    font-size:22px;
    padding:12px 25px;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Đếm ngược 10 phút</h1>

<div id="timer">10:00</div>

<button onclick="startTimer()">Bắt đầu</button>

<audio id="alarm" loop>
<source src="alarm.mp3" type="audio/mpeg">
</audio>

<script>

let time = 6;
let countdown;
let alarm = document.getElementById("alarm");

function startTimer(){

    document.querySelector("button").style.display="none";

    countdown = setInterval(function(){

        let minutes = Math.floor(time/60);
        let seconds = time % 60;

        seconds = seconds < 10 ? "0"+seconds : seconds;

        document.getElementById("timer").innerHTML =
        minutes + ":" + seconds;

        if(time <= 0){
            clearInterval(countdown);
            alarm.play();
            alert("Hết 10 phút!");
        }

        time--;

    },1000);

}

</script>

</body>
</html>
